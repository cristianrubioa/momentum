name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run lint
      - run: npm run build

      - name: Upload card bundle
        uses: actions/upload-artifact@v4
        with:
          name: momentum-card
          path: custom_components/momentum/momentum-card.js

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pytest pytest-asyncio python-dateutil aiohttp homeassistant
      - run: pytest tests/ -v
